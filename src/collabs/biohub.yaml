Title: "bi0hub"
Description: |
  Amazon Web Services is collaborating with Biohub to share datasets in cell biology to help scientists study how cells operate, organize, and work as part of systems to understand why disease happens and how to correct it.
Logo: chan-zuckerberg-biohub-logo.png
Datasets:
  - czi-cellxgene-census
  - czb-opencell
  - cryoet-data-portal
  - tabula-sapiens
  - tabula-muris
  - tabula-muris-senis
  - czi-benchmarking
  - czi-imaging-bsd
  - czi-transcriptomics-mit
  - czi-imagining-mit 
